<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Les jeux du studio – TY‑LUDIC</title>
    <link rel="stylesheet" href="../css/hub-menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header class="tl-header">
    <div class="tl-logo">TY‑LUDIC</div>
    <nav class="tl-nav">
        <a href="../index.html" data-i18n="menu_home"></a>
        <a href="hub-contact.html" class="active" data-i18n="menu_contact"></a>
    </nav>
</header>

<main class="hub-container">
    <section class="hub-intro">
        <h1 data-i18n="contact_title"></h1>
        <p data-i18n="contact_subtitle"> </p>
    </section>

    <section class="hub-grid">

        <!-- Inscription (guest) -->
        <article class="hub-card hub-arcade card-guest">
            <div class="hub-icon">🧾</div>
            <h2 data-i18n="contact_inscription_title"></h2>
            <p data-i18n="contact_inscription_text"></p>
            <a href="../contact/inscription/create-account.html" class="hub-button" data-i18n="contact_inscription_button"></a>
        </article>

        <!-- Connexion (guest) -->
        <article class="hub-card hub-arcade card-guest">
            <div class="hub-icon">🧾</div>
            <h2 data-i18n="contact_connexion_title"></h2>
            <p data-i18n="contact_connexion_text"></p>
            <a href="../contact/inscription/login.html" class="hub-button" data-i18n="contact_connexion_button"></a>
        </article>

        <!-- Déconnexion (member) -->
        <article class="hub-card hub-arcade hidden-game">
            <div class="hub-icon">🧾</div>
            <h2>Déconnexion</h2>
            <p>Déconnecte toi de ton compte</p>
            <a href="../contact/inscription/logout.html" class="hub-button">Déconnexion</a>
        </article>

        <!-- Mon compte (member) -->
        <article class="hub-card hub-arcade hidden-game">
            <div class="hub-icon">🧾</div>
            <h2>Mon Compte</h2>
            <p>Consultation du compte</p>
            <a href="../contact/inscription/consultation-compte.html" class="hub-button">Consultation</a>
        </article>

        <!-- Tchat (member) -->
        <article class="hub-card hub-reflexion card-member">
            <div class="hub-icon">🎤</div>
            <h2 data-i18n="contact_tchat_title"></h2>
            <p data-i18n="contact_tchat_text"></p>
            <a href="../contact/tchat/index.html" class="hub-button" data-i18n="contact_tchat_button"></a>
        </article>

        <!-- Contact (member) -->
        <article class="hub-card hub-rpg hidden-game">
            <div class="hub-icon">📩</div>
            <h2>Assistance Ty-Ludic</h2>
            <p>Tu as des questions, un problème de jeu, contacte nous</p>
            <a href="../contact/assistance/index.html" class="hub-button">On t'écoute</a>
        </article>

    </section>
</main>

<footer class="tl-footer">
    © 2026 TY‑LUDIC — Studio de jeux indépendant
</footer>

<!-- Multilingue -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<script src="../js/i18n.js"></script>

<script>
loadI18n({
    cacheKey: "i18n_cache_contact",
    files: [
        "../lang/cache-version.json",
        "../lang/hub-global.json",
        "../lang/hub-contact.json"
    ]
});
</script>



</body>
</html>
