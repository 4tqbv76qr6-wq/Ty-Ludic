<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion TY‑LUDIC</title>

<style>
body {
    background:#0a0a0a;
    color:#eee;
    font-family:system-ui;
    margin:0;
    padding:20px;
}

#panel {
    max-width:400px;
    margin:40px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    border:3px solid #44f;
    box-shadow:0 0 20px #44f;
}

h1 {
    text-align:center;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button {
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#44f;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

#error {
    color:#f55;
    margin-top:10px;
    text-align:center;
}
</style>
</head>

<body>

<div id="panel">
    <h1>Connexion TY‑LUDIC</h1>

    <input type="text" id="pseudo" placeholder="Pseudo">
    <input type="password" id="password" placeholder="Mot de passe">

    <button id="login-btn">Se connecter</button>
    <button id="create-btn">Créer un compte</button>

    <p id="error"></p>
</div>

<script type="module">
import { auth, db } from "./firebase-init.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

document.getElementById("login-btn").onclick = async () => {
    const pseudo = document.getElementById("pseudo").value.trim();
    const pass = document.getElementById("password").value;

    if (!pseudo || !pass) {
        document.getElementById("error").textContent = "Pseudo et mot de passe requis.";
        return;
    }

    try {
        // 1. Chercher le pseudo dans Firestore
        const q = query(collection(db, "users"), where("pseudo", "==", pseudo));
        const snap = await getDocs(q);

        if (snap.empty) {
            document.getElementById("error").textContent = "Pseudo introuvable.";
            return;
        }

        const data = snap.docs[0].data();
        const emailInterne = data.email; // email interne TY-LUDIC

        // 2. Connexion Firebase Auth
        await signInWithEmailAndPassword(auth, emailInterne, pass);

        // 3. Redirection
        window.location.href = "mon-compte.html";

    } catch (err) {
        document.getElementById("error").textContent = "Erreur : " + err.message;
    }
};

document.getElementById("create-btn").onclick = () => {
    window.location.href = "inscription.html";
};
</script>

</body>
</html>
