<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-i18n="menu_games">Jeux – TY‑LUDIC</title>
    <link rel="stylesheet" href="../css/hub-menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header class="tl-header">
    <div class="tl-logo">TY‑LUDIC</div>

    <nav class="tl-nav">
        <a href="../index.html" data-i18n="menu_home"></a>
        <a href="hub-jeux.html" class="active" data-i18n="menu_games"></a>
    </nav>


    <div class="lang-switch">
        <a href="hub-jeux.html" onclick="localStorage.setItem('lang','fr')" class="lang-item">🇫🇷 <span>FR</span></a>
        <span>|</span>
        <a href="hub-jeux.html" onclick="localStorage.setItem('lang','en')" class="lang-item">🇬🇧 <span>EN</span></a>
        <span>|</span>
        <a href="hub-jeux.html" onclick="localStorage.setItem('lang','es')" class="lang-item">🇪🇸 <span>ES</span></a>
    </div>
</header>

<main class="hub-container">

    <section class="hub-intro">
        <h1 data-i18n="games_title"></h1>
        <p data-i18n="games_subtitle"></p>
    </section>

    <section class="hub-grid">

        <!-- ARCADE -->
        <article class="hub-card hub-arcade">
            <div class="hub-icon">🕹️</div>
            <h2 data-i18n="games_arcade_title"></h2>
            <p data-i18n="games_arcade_text"></p>
            <a href="hub-arcade.html" class="hub-button" data-i18n="games_arcade_button"></a>
        </article>

        <!-- RÉFLEXION -->
        <article class="hub-card hub-reflexion">
            <div class="hub-icon">🧠</div>
            <h2 data-i18n="games_puzzle_title"></h2>
            <p data-i18n="games_puzzle_text"></p>
            <a href="hub-reflexion.html" class="hub-button" data-i18n="games_puzzle_button"></a>
        </article>

        <!-- RPG -->
        <article class="hub-card hub-rpg hidden-game">
            <div class="hub-icon">🛡️</div>
            <h2 data-i18n="games_rpg_title"></h2>
            <p data-i18n="games_rpg_text"></p>
            <a href="rpg/index.html" class="hub-button" data-i18n="games_rpg_button"></a>
        </article>

    </section>
</main>

<footer class="tl-footer" data-i18n="footer_text"></footer>
<script>
    const currentLang = localStorage.getItem("lang") || "fr";

    const files = [
        "../lang/hub-global.json",
        "../lang/hub-games.json"
    ];

    const CACHE_KEY = "i18n_cache_jeux";
    const STRUCT_KEY = "i18n_cache_jeux_structure";

    const cached = localStorage.getItem(CACHE_KEY);
    const cachedStruct = localStorage.getItem(STRUCT_KEY);

    if (cached && cachedStruct) {

        // Recharge les fichiers pour comparer la structure
        Promise.all(files.map(f => fetch(f).then(r => r.json())))
            .then(jsonFiles => {

                const mergedLive = jsonFiles.reduce((acc, obj) => ({ ...acc, ...obj }), {});
                const liveKeys = Object.keys(mergedLive[currentLang]);

                const structCached = JSON.parse(cachedStruct);

                const sameStructure =
                    structCached.length === liveKeys.length &&
                    structCached.every(k => liveKeys.includes(k));

                if (!sameStructure) {
                    localStorage.removeItem(CACHE_KEY);
                    localStorage.removeItem(STRUCT_KEY);
                    loadTranslations();
                } else {
                    applyTranslations(JSON.parse(cached));
                }
            });

    } else {
        loadTranslations();
    }

    function loadTranslations() {
        Promise.all(files.map(f => fetch(f).then(r => r.json())))
            .then(jsonFiles => {

                const merged = jsonFiles.reduce((acc, obj) => ({ ...acc, ...obj }), {});
                const structure = Object.keys(merged[currentLang]);

                localStorage.setItem(CACHE_KEY, JSON.stringify(merged));
                localStorage.setItem(STRUCT_KEY, JSON.stringify(structure));

                applyTranslations(merged);
            });
    }

    function applyTranslations(data) {
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            const text = data[currentLang][key];
            if (text) el.textContent = text;
        });

        document.querySelectorAll(".lang-item").forEach(el => {
            if (el.textContent.includes(currentLang.toUpperCase())) {
                el.classList.add("active");
            }
        });
    }
</script>


</body>
</html>
