<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compte créé – TY‑LUDIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="account-wrapper">

    <h1 class="title">Bienvenue dans TY‑LUDIC !</h1>
    <p class="subtitle">Ton compte a été créé avec succès.</p>

    <div class="info-box">
        <strong>Pseudo :</strong> 
        <span id="pseudo" class="pseudo-display"></span>
    </div>

    <button class="btn-main" onclick="window.location.href='../../index.html'">
        Retour au menu principal
    </button>

</div>

<script>
    const pseudo = localStorage.getItem("tyludic_pseudo");
    document.getElementById("pseudo").textContent = pseudo || "Joueur";
</script>

</body>
</html>
