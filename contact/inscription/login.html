<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion TY‑LUDIC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="login.css">
<script type="module" src="login.js"></script>

</head>
<body>

<div class="container">

    <h1 data-i18n="login_title"></h1>
    <p class="subtitle" data-i18n="login_text"></p>

    <form id="login-form">

        <label data-i18n="login_pseudo"></label>
        <input type="text" id="pseudo" placeholder="Ton pseudo">

        <label data-i18n="login_passwd"></label>
        <input type="password" id="password" placeholder="Ton mot de passe">

        <p id="error-msg"></p>

        <button type="submit" class="btn" data-i18n="login_button"></button>

    </form>

    <p class="link" >
        <a href="create-account.html" data-i18n="login_create"></a>
    </p>

</div>
<!-- i18n -->
    <script>
        const currentLang = localStorage.getItem("lang") || "fr";

        fetch("lang-login.json")
            .then(r => r.json())
            .then(data => {
                document.querySelectorAll("[data-i18n]").forEach(el => {
                    const key = el.getAttribute("data-i18n");
                    const text = data[currentLang][key];
                    if (text) el.textContent = text;
                });
            })
            .catch(err => console.error("Erreur chargement lang-breakout.json", err));
    </script>
</body>
</html>
