<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-i18n="breakout_title">TY‑LUDIC Breakout</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- CSS global + CSS du jeu + composant Arcade Frame -->
    <link rel="stylesheet" href="../arcade.css">
    <link rel="stylesheet" href="breakout.css">
    <link rel="stylesheet" href="../components/arcade-frame.css">
</head>
<body>

    <!-- ⭐ Wrapper global (scalé par JS) -->
    <div id="game-wrapper">

        <!-- ⭐ Composant Arcade Frame -->
        <div class="tl-arcade-frame">

            <!-- Marquee -->
            <div class="tl-marquee">BREAKOUT</div>

            <!-- HUD : Score / Record / Niveau -->
            <div class="tl-hud">
                <div id="score" data-i18n="breakout_score_label"></div>
                <div id="best" data-i18n="breakout_record_label"></div>
                <div id="level" data-i18n="breakout_level_label"></div>
            </div>

            <!-- Bezel + Canvas -->
            <div id="bezel">
                <div class="canvas-wrapper">
                    <canvas id="game" width="500" height="600"></canvas>
                </div>
            </div>

        </div>

        <!-- ⭐ Contrôles tactiles du jeu Breakout -->
        <div class="tl-controls">
            <button id="fire">🎬</button>
            <button id="left">◀️</button>
            <button id="right">▶️</button>
        </div>

    </div> <!-- fin game-wrapper -->

    <!-- JS du jeu Breakout -->
    <script src="js/responsive.js"></script>
    <script src="../components/canvas.js"></script>
    <script src="../components/starfield.js"></script>
    <script src="js/explosions.js"></script>
    <script src="js/gift.js"></script>
 <script type="module">
    import { db } from "../../firebase/firebase-init.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    window.db = db;
    window.doc = doc;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
</script>



    <script src="js/gameover.js"></script>
    <script src="js/game.js"></script>

    <!-- i18n -->
    <script>
        const currentLang = localStorage.getItem("lang") || "fr";

        fetch("lang.json")
            .then(r => r.json())
            .then(data => {
                document.querySelectorAll("[data-i18n]").forEach(el => {
                    const key = el.getAttribute("data-i18n");
                    const text = data[currentLang][key];
                    if (text) el.textContent = text;
                });
            })
            .catch(err => console.error("Erreur chargement lang-breakout.json", err));
    </script>

</body>
</html>
