<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-i18n="breakout_title">TY‑LUDIC Breakout</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ⭐ WRAPPER GLOBAL (scalé par JS) -->
    <div id="game-wrapper">

        <div id="arcade-frame">

            <div id="marquee">TY‑LUDIC BREAKOUT</div>

            <!-- ⭐ HUD simplifié : Score / Record / Niveau -->
            <div id="hud">
                <div id="score" data-i18n="breakout_score_label"></div>
                <div id="best" data-i18n="breakout_record_label"></div>
                <div id="level" data-i18n="breakout_level_label"></div>
            </div>

            <div id="bezel">
                <div class="canvas-wrapper">
                    <canvas id="game" width="500" height="600"></canvas>
                </div>
            </div>
        </div>

        <!-- ⭐ Contrôles tactiles -->
        <div id="controls">
            <button id="left">◀️</button>
            <button id="fire">🎬</button>
            <button id="right">▶️</button>
        </div>

    </div> <!-- fin game-wrapper -->

<script src="js/responsive.js"></script>
<script src="js/canvas.js"></script>
<script src="js/starfield.js"></script>
<script src="js/game.js"></script>

    <script>
        const currentLang = localStorage.getItem("lang") || "fr";

        fetch("lang.json")
            .then(r => r.json())
            .then(data => {
                document.querySelectorAll("[data-i18n]").forEach(el => {
                    const key = el.getAttribute("data-i18n");
                    const text = data[currentLang][key];
                    if (text) el.textContent = text;
                });
            })
            .catch(err => console.error("Erreur chargement lang-breakout.json", err));
    </script>

</body>
</html>
