<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration RSL – TY‑LUDIC</title>
    <link rel="stylesheet" href="rsl-manager.css">
</head>

<body>

    <h1>Gestion des joueurs RSL</h1>

    <section class="admin-section">

        <!-- Formulaire d'ajout -->
        <div class="form-group">
            <label for="pseudo-input">Ajouter un joueur RSL</label>
            <input type="text" id="pseudo-input" placeholder="Pseudo RSL…">
            <button id="add-btn">Ajouter</button>
        </div>

        <!-- Liste des joueurs -->
        <h2>Liste des joueurs</h2>
        <ul id="rsl-list" class="rsl-list"></ul>

    </section>

    <script type="module">
        import { db } from "../../firebase/firebase-init.js";
        import {
            doc,
            getDoc,
            setDoc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const pseudoInput = document.getElementById("pseudo-input");
        const addBtn = document.getElementById("add-btn");
        const rslList = document.getElementById("rsl-list");

        const rslDocRef = doc(db, "config", "rsl_players");

        // Assurer l'existence du document
        async function ensureDocumentExists() {
            const snap = await getDoc(rslDocRef);
            if (!snap.exists()) {
                await setDoc(rslDocRef, { players: [] });
            }
        }

        // Charger la liste
        async function loadRslPlayers() {
            const snap = await getDoc(rslDocRef);
            if (!snap.exists()) return;

            const players = snap.data().players || [];
            rslList.innerHTML = "";

            players.forEach(pseudo => {
                const li = document.createElement("li");
                li.innerHTML = `
                    <span>${pseudo}</span>
                    <button class="delete-btn" data-pseudo="${pseudo}">Supprimer</button>
                `;
                rslList.appendChild(li);
            });
        }

        // Ajouter un pseudo
        addBtn.addEventListener("click", async () => {
            const newPseudo = pseudoInput.value.trim();
            if (!newPseudo) return;

            const snap = await getDoc(rslDocRef);
            const players = snap.data().players || [];

            if (!players.includes(newPseudo)) {
                players.push(newPseudo);
                await updateDoc(rslDocRef, { players });
                pseudoInput.value = "";
                loadRslPlayers();
            }
        });

        // Supprimer un pseudo
        rslList.addEventListener("click", async (e) => {
            if (!e.target.classList.contains("delete-btn")) return;

            const pseudoToDelete = e.target.dataset.pseudo;

            const snap = await getDoc(rslDocRef);
            let players = snap.data().players || [];

            players = players.filter(p => p !== pseudoToDelete);
            await updateDoc(rslDocRef, { players });

            loadRslPlayers();
        });

        // Initialisation
        (async () => {
            await ensureDocumentExists();
            await loadRslPlayers();
        })();
    </script>

</body>
</html>
