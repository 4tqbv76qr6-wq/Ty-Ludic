<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-i18n="arcade_title">Arcade – TY‑LUDIC</title>
    <link rel="stylesheet" href="../css/hub-menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header class="tl-header">
    <div class="tl-logo">TY‑LUDIC</div>

    <nav class="tl-nav">
        <a href="../../index.html" data-i18n="menu_home"></a>
        <a href="../index.html"  data-i18n="menu_games"></a>
        <a href="index.html" class="active" data-i18n="menu_arcade"></a>

    </nav>

    <div class="lang-switch">
        <a href="index.html" onclick="localStorage.setItem('lang','fr')" class="lang-item">🇫🇷 <span>FR</span></a>
        <span>|</span>
        <a href="index.html" onclick="localStorage.setItem('lang','en')" class="lang-item">🇬🇧 <span>EN</span></a>
        <span>|</span>
        <a href="index.html" onclick="localStorage.setItem('lang','es')" class="lang-item">🇪🇸 <span>ES</span></a>
    </div>
</header>

<main class="hub-container">

    <section class="hub-intro">
        <h1 data-i18n="arcade_intro_title"></h1>
        <p data-i18n="arcade_intro_text"></p>
    </section>

    <section class="hub-grid">

        <!-- ALIEN PULSE -->
        <article class="hub-card hub-arcade">
            <div class="hub-icon">🛸</div>
            <h2 data-i18n="arcade_alien_title"></h2>
            <p data-i18n="arcade_alien_text"></p>
            <a href="../arcade/alien-pulse/index.html" class="hub-button" data-i18n="arcade_alien_button"></a>
        </article>

        <!-- BREAKOUT -->
        <article class="hub-card hub-reflexion">
            <div class="hub-icon">🧱</div>
            <h2 data-i18n="arcade_breakout_title"></h2>
            <p data-i18n="arcade_breakout_text"></p>
            <a href="../arcade/breakout/index.html" class="hub-button" data-i18n="arcade_breakout_button"></a>
        </article>

        <!-- NEON RACER -->
        <article class="hub-card hub-reflexion hidden-game">
            <div class="hub-icon">🏎️</div>
            <h2 data-i18n="arcade_neon_racer_title"></h2>
            <p data-i18n="arcade_neon_racer_text"></p>
            <a href="../arcade/neon-racer/index.html" class="hub-button" data-i18n="arcade_neon_racer_button"></a>
        </article>

    </section>
</main>

<footer class="tl-footer" data-i18n="footer_text"></footer>

<script>
    const currentLang = localStorage.getItem("lang") || "fr";

    fetch("../lang/hub-arcade.json")
        .then(r => r.json())
        .then(data => {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                const text = data[currentLang][key];
                if (text) el.textContent = text;
            });
        })
        .catch(err => console.error("Erreur chargement lang-arcade.json", err));

    document.querySelectorAll(".lang-item").forEach(el => {
        if (el.textContent.includes(currentLang.toUpperCase())) {
            el.classList.add("active");
        }
    });
</script>

</body>
</html>
