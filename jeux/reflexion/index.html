<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-i18n="arcade_title">Réflexion – TY‑LUDIC</title>
    <link rel="stylesheet" href="../../css/hub-menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header class="tl-header">
    <div class="tl-logo">TY‑LUDIC</div>

    <nav class="tl-nav">
        <a href="../../index.html" data-i18n="menu_home"></a>
        <a href="../index.html" data-i18n="menu_games"></a>
        <a href="../index.html" class="active" data-i18n="menu_reflexion"></a>
    </nav>

    <div class="lang-switch">
        <a href="index.html" onclick="localStorage.setItem('lang','fr')" class="lang-item">🇫🇷 <span>FR</span></a>
        <span>|</span>
        <a href="index.html" onclick="localStorage.setItem('lang','en')" class="lang-item">🇬🇧 <span>EN</span></a>
        <span>|</span>
        <a href="index.html" onclick="localStorage.setItem('lang','es')" class="lang-item">🇪🇸 <span>ES</span></a>
    </div>
</header>

<main class="hub-container">

    <section class="hub-intro">
        <h1 data-i18n="reflexion_intro_title"></h1>
        <p data-i18n="reflexion_intro_text"></p>
    </section>

    <section class="hub-grid">

        <!-- ALIEN PULSE -->
        <article class="hub-card hub-arcade">
            <div class="hub-icon">3️⃣❎</div>
            <h2 data-i18n="reflexion_morpion_title"></h2>
            <p data-i18n="reflexion_morpion_text"></p>
            <a href="morpion/index.html" class="hub-button" data-i18n="reflexion_morpion_button"></a>
        </article>

        <!-- BREAKOUT -->
        <article class="hub-card hub-reflexion">
            <div class="hub-icon">4️⃣❎</div>
            <h2 data-i18n="reflexion_puissance4_title"></h2>
            <p data-i18n="reflexion_puissance4_text"></p>
            <a href="puissance-4/index.html" class="hub-button" data-i18n="reflexion_puissance4_button"></a>
        </article>

    </section>
</main>

<footer class="tl-footer" data-i18n="footer_text"></footer>

<script>
    const currentLang = localStorage.getItem("lang") || "fr";

    fetch("lang.json")
        .then(r => r.json())
        .then(data => {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                const text = data[currentLang][key];
                if (text) el.textContent = text;
            });
        })
        .catch(err => console.error("Erreur chargement lang-arcade.json", err));

    document.querySelectorAll(".lang-item").forEach(el => {
        if (el.textContent.includes(currentLang.toUpperCase())) {
            el.classList.add("active");
        }
    });
</script>

</body>
</html>
