<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test ScoreManager</title>
</head>
<body>

<h2>Test ScoreManager</h2>

<label>Nom du jeu :</label>
<input id="game" value="breakout"><br><br>

<label>Pseudo :</label>
<input id="pseudo" value="Jean"><br><br>

<label>Score :</label>
<input id="score" type="number" value="123"><br><br>

<button id="btn">Tester l’écriture</button>

<script type="module">
    /* --- DIAGNOSTIC : script chargé --- */
    alert("SCRIPT CHARGÉ");

    /* --- Imports --- */
    alert("Avant import");
    import { saveScore } from "./scoremanager.js";   // ⚠️ nom en minuscules
    import { auth } from "../firebase/firebase-init.js";
    alert("Après import");

    /* --- Vérification des imports --- */
    alert("saveScore = " + saveScore);
    alert("auth = " + auth);

    /* --- Bouton relié --- */
    document.getElementById("btn").onclick = async () => {
        alert("BOUTON OK");

        const game = document.getElementById("game").value;
        const pseudo = document.getElementById("pseudo").value;
        const score = parseInt(document.getElementById("score").value);

        /* --- Vérification utilisateur --- */
        alert("auth.currentUser = " + auth.currentUser);

        if (!auth.currentUser) {
            alert("Connecte-toi d'abord !");
            return;
        }

        /* --- Appel Firestore --- */
        alert("Appel saveScore");
        const ok = await saveScore(game, score, pseudo);

        if (ok) {
            alert("Écriture Firestore OK !");
        } else {
            alert("Échec écriture Firestore");
        }
    };
</script>

</body>
</html>
