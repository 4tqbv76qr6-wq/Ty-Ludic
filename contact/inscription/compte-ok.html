<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compte créé – TY‑LUDIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="account-wrapper">

    <h1 data-i18n="compte_ok_title"></h1>
    <p data-i18n="compte_ok_text"></p>

    <p><strong data-i18n="compte_ok_pseudo"></strong> <span id="pseudo"></span></p>

    <button onclick="window.location.href='../../index.html'" data-i18n="compte_ok_button">
    </button>

</div>

<!-- i18n -->
    <script>
        const currentLang = localStorage.getItem("lang") || "fr";

        fetch("lang-compte-ok.json")
            .then(r => r.json())
            .then(data => {
                document.querySelectorAll("[data-i18n]").forEach(el => {
                    const key = el.getAttribute("data-i18n");
                    const text = data[currentLang][key];
                    if (text) el.textContent = text;
                });
            })
            .catch(err => console.error("Erreur chargement lang-breakout.json", err));
    </script>

<script>
    // Affiche le pseudo stocké
    const pseudo = localStorage.getItem("tyludic_pseudo");
    document.getElementById("pseudo").textContent = pseudo || "Joueur";
</script>

</body>
</html>
