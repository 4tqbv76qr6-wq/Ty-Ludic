    </section>
</main>

<footer class="tl-footer" data-i18n="footer_text"></footer>

<script>
    // Langue courante (FR par défaut)
    const currentLang = localStorage.getItem("lang") || "fr";

    // Chargement du JSON multilingue
    fetch("lang.json")
        .then(r => r.json())
        .then(data => {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                const text = data[currentLang][key];
                if (text) el.textContent = text;
            });
        })
        .catch(err => console.error("Erreur chargement lang.json", err));

    // Activation visuelle de la langue sélectionnée
    document.querySelectorAll(".lang-item").forEach(el => {
        if (el.textContent.includes(currentLang.toUpperCase())) {
            el.classList.add("active");
        }
    });
</script>

<!-- Initialisation Firebase -->
<script type="module" src="contact/inscription/firebase-init.js"></script>

<!-- Affichage du pseudo si connecté -->
<script type="module">
import { auth } from "./contact/inscription/firebase-init.js";

const pseudo = localStorage.getItem("tyludic_pseudo");
const userBox = document.getElementById("user-info");

// Si un utilisateur est connecté
if (auth.currentUser && pseudo) {
    userBox.textContent = "Connecté : " + pseudo;
} else {
    userBox.textContent = "";
}
</script>
<script type="module">

</script>

<script type="module">

<script type="module">
import { auth } from "./contact/inscription/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const userBox = document.getElementById("user-info");
const pseudo = localStorage.getItem("tyludic_pseudo");

// Attendre que Firebase Auth soit prêt
onAuthStateChanged(auth, (user) => {
    if (user && pseudo) {
        userBox.textContent = "Connecté : " + pseudo;
    } else {
        userBox.textContent = "";
    }
});
</script>
