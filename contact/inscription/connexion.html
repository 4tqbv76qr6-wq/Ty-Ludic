<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion TY‑LUDIC</title>

<style>
body {
    background:#0a0a0a;
    color:#eee;
    font-family:system-ui;
    margin:0;
    padding:20px;
}

/* Cadre néon */
#panel {
    max-width:400px;
    margin:40px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    border:3px solid #44f;
    box-shadow:0 0 25px #44f;
}

/* Titre */
h1 {
    text-align:center;
    margin-bottom:20px;
    color:#44f;
}

/* Champs */
input {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    background:#222;
    color:#eee;
}

/* Boutons néon */
button {
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#44f;
    color:white;
    cursor:pointer;
    margin-top:10px;
    box-shadow:0 0 10px #44f;
}

button:active {
    transform:scale(0.97);
}

/* Erreur */
#error {
    color:#f55;
    margin-top:10px;
    text-align:center;
}
</style>
</head>

<body>

<div id="panel">
    <h1>Connexion TY‑LUDIC</h1>

    <input type="text" id="pseudo" placeholder="Pseudo">
    <input type="password" id="password" placeholder="Mot de passe">

    <button id="login-btn">Se connecter</button>
    <button id="create-btn">Créer un compte</button>

    <p id="error"></p>
</div>

<script type="module">
import { auth, db } from "./firebase-init.js";
import { signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* Hash SHA-256 */
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

document.getElementById("login-btn").onclick = async () => {
    const pseudo = document.getElementById("pseudo").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorBox = document.getElementById("error");

    errorBox.textContent = "";

    try {
        // 1. Chercher le pseudo dans Firestore
        const q = query(collection(db, "users"), where("pseudo", "==", pseudo));
        const snap = await getDocs(q);

        if (snap.empty) {
            errorBox.textContent = "Pseudo introuvable.";
            return;
        }

        const data = snap.docs[0].data();

        // 2. Vérifier le mot de passe
        const hash = await hashPassword(password);

        if (hash !== data.auth.passwordHash) {
            errorBox.textContent = "Mot de passe incorrect.";
            return;
        }

        // 3. Auth anonyme Firebase
        await signInAnonymously(auth);

        // 4. Stocker l’UID et pseudo localement
        localStorage.setItem("tyludic_uid", data.uid);
        localStorage.setItem("tyludic_pseudo", data.pseudo);

        // 5. Redirection
        window.location.href = "mon-compte.html";

    } catch (err) {
        errorBox.textContent = err.message;
    }
};

document.getElementById("create-btn").onclick = () => {
    window.location.href = "inscription.html";
};
</script>

</body>
</html>
