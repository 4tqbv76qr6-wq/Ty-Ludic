<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-i18n="menu_games">Jeux – TY‑LUDIC</title>
    <link rel="stylesheet" href="../css/hub-menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header class="tl-header">
    <div class="tl-logo">TY‑LUDIC</div>

    <nav class="tl-nav">
        <a href="../index.html" data-i18n="menu_home"></a>
        <a href="index.html" class="active" data-i18n="menu_games"></a>
    </nav>


 
</header>

<main class="hub-container">

    <section class="hub-intro">
        <h1 data-i18n="profile_title"></h1>
        <p data-i18n="profile_subtitle"></p>
    </section>

    <section class="hub-grid">

        <!-- profils rsl-->
        <article class="hub-card hub-arcade">
            <div class="hub-icon">👤</div>
            <h2 data-i18n="profile_rsl_title"></h2>
            <p data-i18n="profile_rsl_text"></p>
            <a href="../admin/profile/rsl.html" class="hub-button" data-i18n="profile_rsl_button"></a>
        </article>

<!-- profils admin-->
        <article class="hub-card hub-arcade">
            <div class="hub-icon">👤</div>
            <h2 data-i18n="profile_admin_title"></h2>
            <p data-i18n="profile_admin_text"></p>
            <a href="../admin/profile/admin.html" class="hub-button" data-i18n="profile_admin_button"></a>
        </article>

<!-- profils beta testeurs-->
        <article class="hub-card hub-arcade">
            <div class="hub-icon">👤</div>
            <h2 data-i18n="profile_test_title"></h2>
            <p data-i18n="profile_test_text"></p>
            <a href="../admin/profile/test.html" class="hub-button" data-i18n="profile_test_button"></a>
        </article>


        
        

    </section>
</main>

<footer class="tl-footer" data-i18n="footer_text"></footer>

<script>
    // Langue courante (FR par défaut)
    const currentLang = localStorage.getItem("lang") || "fr";

    // Chargement du JSON multilingue
    fetch("../lang/hub-profiles.json")
        .then(r => r.json())
        .then(data => {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                const text = data[currentLang][key];
                if (text) el.textContent = text;
            });
        })
        .catch(err => console.error("Erreur chargement lang.json", err));

    // Activation visuelle de la langue sélectionnée
    document.querySelectorAll(".lang-item").forEach(el => {
        if (el.textContent.includes(currentLang.toUpperCase())) {
            el.classList.add("active");
        }
    });
</script>

</body>
</html>
