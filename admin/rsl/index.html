<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion RSL – Debug</title>
    <link rel="stylesheet" href="rsl-manager.css">
</head>

<body>

<h1>Gestion des joueurs RSL (DEBUG)</h1>

<div class="rsl-box">

    <input type="text" id="pseudo-input" placeholder="Pseudo RSL à ajouter…">
    <button id="add-btn">Ajouter le pseudo</button>

    <h2>Liste des joueurs RSL</h2>
    <ul id="rsl-list"></ul>

</div>

<script type="module">

    alert("[DEBUG] Script chargé.");

    // --- IMPORT FIREBASE ---
    try {
        alert("[DEBUG] Import firebase-init.js…");
        import("./firebase-init.js")
            .then(module => {
                const db = module.db;
                alert("[DEBUG] db importé : " + db);

                startRslManager(db);
            })
            .catch(err => {
                alert("[ERREUR] Impossible d'importer firebase-init.js : " + err);
            });

    } catch (err) {
        alert("[ERREUR] Exception lors de l'import firebase-init.js : " + err);
    }


    // --- FONCTION PRINCIPALE ---
    async function startRslManager(db) {

        alert("[DEBUG] startRslManager() lancé.");

        // Import Firestore
        const {
            doc,
            getDoc,
            setDoc,
            updateDoc
        } = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js");

        alert("[DEBUG] Firestore importé.");

        const pseudoInput = document.getElementById("pseudo-input");
        const addBtn = document.getElementById("add-btn");
        const rslList = document.getElementById("rsl-list");

        const rslDocRef = doc(db, "config", "rsl_players");
        alert("[DEBUG] rslDocRef créé : " + JSON.stringify(rslDocRef));

        // --- Vérifier / créer document ---
        async function ensureDocumentExists() {
            alert("[DEBUG] Vérification du document…");

            try {
                const snap = await getDoc(rslDocRef);

                if (!snap.exists()) {
                    alert("[DEBUG] Document inexistant → création…");
                    await setDoc(rslDocRef, { players: [] });
                    alert("[DEBUG] Document créé avec players: []");
                } else {
                    alert("[DEBUG] Document existant.");
                }

            } catch (err) {
                alert("[ERREUR] ensureDocumentExists : " + err);
            }
        }

        // --- Charger liste ---
        async function loadRslPlayers() {
            alert("[DEBUG] Chargement des joueurs…");

            try {
                const snap = await getDoc(rslDocRef);

                if (!snap.exists()) {
                    alert("[ERREUR] Document introuvable lors du chargement.");
                    return;
                }

                const data = snap.data();
                alert("[DEBUG] Données reçues : " + JSON.stringify(data));

                const players = data.players || [];
                alert("[DEBUG] Liste des joueurs : " + players.join(", "));

                rslList.innerHTML = "";

                players.forEach(pseudo => {
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <span>${pseudo}</span>
                        <button class="delete-btn" data-pseudo="${pseudo}">Supprimer</button>
                    `;
                    rslList.appendChild(li);
                });

            } catch (err) {
                alert("[ERREUR] loadRslPlayers : " + err);
            }
        }

        // --- Ajouter pseudo ---
        addBtn.addEventListener("click", async () => {
            const newPseudo = pseudoInput.value.trim();
            alert("[DEBUG] Clic Ajouter → pseudo = " + newPseudo);

            if (!newPseudo) {
                alert("[ERREUR] Aucun pseudo saisi.");
                return;
            }

            try {
                const snap = await getDoc(rslDocRef);

                if (!snap.exists()) {
                    alert("[ERREUR] Document introuvable lors de l'ajout.");
                    return;
                }

                let players = snap.data().players || [];
                alert("[DEBUG] Liste actuelle : " + players.join(", "));

                if (players.includes(newPseudo)) {
                    alert("[ERREUR] Pseudo déjà présent.");
                    return;
                }

                players.push(newPseudo);
                alert("[DEBUG] Nouvelle liste : " + players.join(", "));

                await updateDoc(rslDocRef, { players });
                alert("[DEBUG] Pseudo ajouté : " + newPseudo);

                pseudoInput.value = "";
                loadRslPlayers();

            } catch (err) {
                alert("[ERREUR] Ajout pseudo : " + err);
            }
        });

        // --- Suppression pseudo ---
        rslList.addEventListener("click", async (e) => {
            if (!e.target.classList.contains("delete-btn")) return;

            const pseudoToDelete = e.target.dataset.pseudo;
            alert("[DEBUG] Suppression demandée pour : " + pseudoToDelete);

            try {
                const snap = await getDoc(rslDocRef);

                if (!snap.exists()) {
                    alert("[ERREUR] Document introuvable lors de la suppression.");
                    return;
                }

                let players = snap.data().players || [];
                alert("[DEBUG] Liste avant suppression : " + players.join(", "));

                players = players.filter(p => p !== pseudoToDelete);
                alert("[DEBUG] Liste après suppression : " + players.join(", "));

                await updateDoc(rslDocRef, { players });
                alert("[DEBUG] Pseudo supprimé : " + pseudoToDelete);

                loadRslPlayers();

            } catch (err) {
                alert("[ERREUR] Suppression pseudo : " + err);
            }
        });

        // --- Initialisation ---
        alert("[DEBUG] Initialisation…");
        await ensureDocumentExists();
        await loadRslPlayers();
        alert("[DEBUG] Initialisation terminée.");
    }

</script>

</body>
</html>
