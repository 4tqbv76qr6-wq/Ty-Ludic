<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-i18n="menu_home">TY‑LUDIC</title>
    <link rel="stylesheet" href="css/hub-menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header class="tl-header">
    <div class="tl-logo">TY‑LUDIC</div>

    <nav class="tl-nav">
        <a href="index.html" class="active" data-i18n="menu_home"></a>
    </nav>

    <!-- Bloc utilisateur -->
    <div id="user-info" class="tl-user" data-i18n="user_status"></div>


    <div class="lang-switch">
        <a href="index.html" onclick="localStorage.setItem('lang','fr')" class="lang-item">🇫🇷 <span>FR</span></a>
        <span>|</span>
        <a href="index.html" onclick="localStorage.setItem('lang','en')" class="lang-item">🇬🇧 <span>EN</span></a>
        <span>|</span>
        <a href="index.html" onclick="localStorage.setItem('lang','es')" class="lang-item">🇪🇸 <span>ES</span></a>
    </div>
</header>

<main class="hub-container">

    <section class="hub-intro">
        <h1 data-i18n="home_title"></h1>
        <p data-i18n="home_subtitle"></p>
    </section>

    <section class="hub-grid">

        <!-- Jeux -->
        <article class="hub-card hub-arcade">
            <div class="hub-icon">🕹️</div>
            <h2 data-i18n="card_games_title"></h2>
            <p data-i18n="card_games_text"></p>
            <a href="hub/hub-jeux.html" class="hub-button" data-i18n="card_games_button"></a>
        </article>

        <!-- Studio -->
        <article class="hub-card hub-reflexion hidden-game">
            <div class="hub-icon">🏠</div>
            <h2 data-i18n="card_studio_title"></h2>
            <p data-i18n="card_studio_text"></p>
            <a href="studio/index.html" class="hub-button" data-i18n="card_studio_button"></a>
        </article>

        <!-- Canal Ty-Ludic -->
        <article class="hub-card hub-rpg">
            <div class="hub-icon">📡</div>
            <h2 data-i18n="card_channel_title"></h2>
            <p data-i18n="card_channel_text"></p>
            <a href="hub/hub-contact.html" class="hub-button" data-i18n="card_channel_button"></a>
        </article>

        <!-- RSL (contrôlé par rôle) -->
        <article class="hub-card hub-rpg role-rsl">
            <div class="hub-icon">⚔️</div>
            <h2 data-i18n="card_rsl_title"></h2>
            <p data-i18n="card_rsl_text"></p>
            <a href="rsl/index.html" class="hub-button" data-i18n="card_rsl_button"></a>
        </article>

        <!-- Admin (pas encore de gestion de droits) -->
        <article class="hub-card hub-rpg role-rsl">
            <div class="hub-icon">⚙️</div>
            <h2 data-i18n="card_admin_title"></h2>
            <p data-i18n="card_admin_text"></p>
            <a href="hub/hub-admin.html" class="hub-button" data-i18n="card_admin_button"></a>
        </article>

    </section>
</main>

<footer class="tl-footer" data-i18n="footer_text"></footer>

<!-- Multilingue -->
<script>
    const currentLang = localStorage.getItem("lang") || "fr";

    fetch("lang/hub.json")
        .then(r => r.json())
        .then(data => {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                const text = data[currentLang][key];
                if (text) el.textContent = text;
            });
        });

    document.querySelectorAll(".lang-item").forEach(el => {
        if (el.textContent.includes(currentLang.toUpperCase())) {
            el.classList.add("active");
        }
    });
</script>

<!-- Firebase + RSL -->
<script type="module">
    import { auth, db } from "./firebase/firebase-init.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const userBox = document.getElementById("user-info");
    const pseudo = localStorage.getItem("tyludic_pseudo");

    // Masquer les cartes RSL par défaut
    document.querySelectorAll(".role-rsl").forEach(card => {
        card.style.display = "none";
    });

    // Fonction pour afficher les cartes RSL
    function showRslCards() {
        document.querySelectorAll(".role-rsl").forEach(card => {
            card.style.display = "block";
        });
    }

    // Vérifier si le pseudo est membre RSL
    async function checkRslRole(pseudo) {
        const rslDocRef = doc(db, "config", "rsl_players");
        const snap = await getDoc(rslDocRef);

        if (!snap.exists()) return false;

        const players = snap.data().players || [];
        return players.includes(pseudo);
    }

    onAuthStateChanged(auth, async (user) => {
    if (user && pseudo) {
        userBox.textContent = "👤 " + pseudo;   // ici c’est normal, pseudo = dynamique
    } else {
        userBox.setAttribute("data-i18n", "user_not_connected");

        // Re-appliquer la traduction
        fetch("lang/hub.json")
            .then(r => r.json())
            .then(data => {
                const text = data[currentLang]["user_not_connected"];
                userBox.textContent = text;
            });
    }
});

</script>

</body>
</html>
