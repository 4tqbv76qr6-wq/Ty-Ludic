<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion TY‑LUDIC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="login.css">
<script type="module" src="login.js"></script>

</head>
<body>

<div class="container">

    <h1>Connexion TY‑LUDIC</h1>
    <p class="subtitle">Entre ton pseudo et ton mot de passe pour rejoindre l’aventure.</p>

    <form id="login-form">

        <label>Pseudo</label>
        <input type="text" id="pseudo" placeholder="Ton pseudo">

        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="Ton mot de passe">

        <p id="error-msg"></p>

        <button type="submit" class="btn">Se connecter</button>

    </form>

    <p class="link">
        Pas encore de compte ?  
        <a href="create-account.html">Créer un compte</a>
    </p>

</div>

</body>
</html>
