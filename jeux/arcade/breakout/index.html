<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TY‑LUDIC Breakout</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ⭐ WRAPPER GLOBAL (scalé par JS) -->
    <div id="game-wrapper">

        <div id="arcade-frame">

            <div id="marquee">TY‑LUDIC BREAKOUT</div>

            <!-- ⭐ HUD simplifié : Score / Record / Niveau -->
            <div id="hud">
                <div id="score">Score : 0</div>
                <div id="best">Record : 0</div>
                <div id="level">Niveau : 1</div>
            </div>

            <div id="bezel">
                <div class="canvas-wrapper">
                    <canvas id="game" width="500" height="600"></canvas>
                </div>
            </div>
        </div>

        <!-- ⭐ Contrôles tactiles -->
        <div id="controls">
            <button id="left">◀️</button>
            <button id="fire">🎬</button>
            <button id="right">▶️</button>
        </div>

    </div> <!-- fin game-wrapper -->

    <script src="game.js"></script>
</body>
</html>
