<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Alien Pulse</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="arcade-frame">

        <div id="marquee">TY‑LUDIC ARCADE</div>

        <div id="hud">
            <div id="score">Score : 0</div>
            <div id="level">Niveau : 1</div>
            <div id="best">Record : 0</div>
        </div>

        <div id="bezel">
            <div class="canvas-wrapper">
                <canvas id="game" width="500" height="600"></canvas>
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="left">◀️</button>
        <button id="fire">🔥</button>
        <button id="right">▶️</button>
    </div>

    <div id="highscores"></div>

    <!-- ⭐ Popup de transition de niveau -->
    <div id="level-popup" class="hidden">
        <div id="level-box">
            <h2 id="level-title">LEVEL 1</h2>
            <button id="level-start">START</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
